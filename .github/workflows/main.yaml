name: Linting
run-name: Linting

permissions: read-all

on:
  pull_request:
    branches:
      - main
jobs:
  lint:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        id: pre-commit
        run: |
          pre-commit run --all-files > precommit.log 2>&1

      - name: Commit fixes (if any)
        if: ${{always() && steps.pre-commit.outcome == 'failure' }}
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add -A ':! .github/workflows/*'
            git commit -m "apply pre-commit fixes"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No changes to commit"
          fi

      - name: Create PR comment with linting results
        if: ${{ always() && steps.pre-commit.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const output = fs.readFileSync('precommit.log', 'utf8');

            const commentBody = `### Pre-commit Failed\n\`\`\`\n${output}\n\`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
          